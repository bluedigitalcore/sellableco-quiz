<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Digital Core</title>
<script>
/* ============================================================
   CONTENT: everything brand-specific lives here.
   To reskin: change colors, logo text, copy, links.
   Nothing below the config needs to be touched.
   ============================================================ */
const CONTENT = {

  brand: {
    logoText: "BLUE DIGITAL",
    logoAccent: "CORE",
    colors: {
      accent:     "#1d4ed8",              // buttons, highlights, price
      accentDark: "#173db0",              // button hover
      accentSoft: "#e8edfb",              // kickers, soft backgrounds
      bg:         "#fbfbfd",              // page background
      surface:    "#ffffff",              // cards
      dark:       "#101526",              // demo section background
      darkText:   "#f5f6fa",              // text on dark background
      text:       "#15192b",              // headings / main text
      textMuted:  "#5d6275",              // secondary text
      border:     "#e5e6ee"               // card and row borders
    }
  },

  hero: {
    headline: "Your PDF freebie is leaving half your leads on the table.",
    subhead: "I build custom quiz funnels and AI DM assistants for coaches. Your branding, your domain, no monthly tool fees. You approve the full blueprint before I build a thing.",
    buttonLabel: "See a live demo",
    buttonHref: "#demo"
  },

  demo: {
    kicker: "Live demo",
    title: "Try it like your audience would.",
    body: "This is a working demo I built for a fictional coach. Take it on your phone, that's where your leads live.",
    buttonLabel: "Take the demo quiz",
    url: "https://bluedigitalcore.github.io/sellableco-quiz/"
  },

  why: {
    kicker: "Why quizzes",
    paragraphs: [
      "PDF lead magnets convert around 20 percent. Quizzes average around 40. Same traffic, double the emails.",
      "And a quiz tells you who's ready to buy before you ever talk to them.",
      "Tools like involve.me charge up to $99 a month for a template. I build yours custom, on your own domain, once."
    ]
  },

  how: {
    kicker: "How it works",
    steps: [
      {
        title: "The blueprint.",
        body: "You tell me about your offer and audience. I map your full quiz: questions, result types, the flow. You see everything before paying for the build."
      },
      {
        title: "The build.",
        body: "Custom coded in your branding, connected to your email list. Days, not weeks."
      },
      {
        title: "Live.",
        body: "It runs on your domain. No subscriptions, no per-contact pricing, it's yours."
      }
    ]
  },

  pricing: {
    kicker: "Pricing",
    cards: [
      {
        name: "The Quiz Funnel",
        price: "$1,450",
        priceNote: "one time",
        features: [
          "Custom quiz in your branding, on your domain",
          "Email capture wired to your list",
          "Three result types with tailored CTAs",
          "Blueprint approved by you first"
        ],
        featured: false
      },
      {
        name: "The Lead Machine",
        price: "$2,200",
        priceNote: "one time plus $99 a month hosting",
        features: [
          "Everything in the Quiz Funnel",
          "An AI DM assistant that replies in your voice 24/7",
          "Delivers your quiz link",
          "Answers questions while you sleep"
        ],
        featured: true
      }
    ]
  },

  faq: {
    kicker: "FAQ",
    items: [
      {
        q: "Do we need to get on a call?",
        a: "No. Everything runs in writing. You get a full blueprint to approve, most clients prefer it."
      },
      {
        q: "What do you need from me?",
        a: "Access nobody should ever give: none. Your email tool connects through its own integrations, your Instagram through Meta's official partner access. No passwords, ever."
      },
      {
        q: "How long does it take?",
        a: "Blueprint within 48 hours of your answers. Build, 3 to 5 days after approval."
      },
      {
        q: "What if I don't like the blueprint?",
        a: "Then you don't pay for a build. The blueprint round is where we get it right."
      }
    ]
  },

  footer: {
    name: "Blue Digital Core",
    emailLabel: "Email:",
    email: "hello@repona.ai",
    note: "Not interested in emails from me? One reply and you're off my list."
  }
};
/* ================== END CONTENT ================== */
</script>

<style>
  :root { /* colors are injected from CONTENT by JS */ }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .container {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
  }

  section { padding: 72px 0; }

  /* ---------- header ---------- */
  header {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .logo {
    font-weight: 800;
    letter-spacing: 0.14em;
    font-size: 14px;
  }
  .logo span { color: var(--accent); }

  /* ---------- shared ---------- */
  .kicker {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }

  h2 {
    font-size: 26px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  .muted { color: var(--text-muted); }

  .btn {
    display: inline-block;
    padding: 16px 32px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.98); }

  /* ---------- hero ---------- */
  #hero { padding: 88px 0 96px; }
  #hero .subhead {
    font-size: 17px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  /* ---------- demo ---------- */
  #demo {
    background: var(--dark);
    color: var(--dark-text);
  }
  #demo .kicker {
    background: rgba(255,255,255,0.08);
    color: var(--dark-text);
  }
  #demo p {
    color: var(--dark-text);
    opacity: 0.75;
    margin-bottom: 32px;
    font-size: 17px;
  }
  #demo .btn {
    width: 100%;
    text-align: center;
    font-size: 18px;
    padding: 18px 32px;
  }

  /* ---------- why ---------- */
  #why p {
    font-size: 17px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  #why p:first-of-type {
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
  }

  /* ---------- how ---------- */
  .step {
    display: flex;
    gap: 18px;
    padding: 24px 0;
  }
  .step + .step { border-top: 1px solid var(--border); }
  .step-num {
    flex: none;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 50%;
    margin-top: 2px;
  }
  .step h3 { font-size: 18px; margin-bottom: 4px; }
  .step p { color: var(--text-muted); font-size: 16px; }

  /* ---------- pricing ---------- */
  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 8px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 30px 26px;
  }
  .card.featured { border: 2px solid var(--accent); }
  .card h3 { font-size: 20px; margin-bottom: 12px; }
  .price {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    line-height: 1;
  }
  .price-note {
    font-size: 14px;
    color: var(--text-muted);
    margin: 6px 0 22px;
  }
  .card ul { list-style: none; }
  .card li {
    font-size: 15.5px;
    color: var(--text-muted);
    padding: 9px 0 9px 26px;
    position: relative;
  }
  .card li + li { border-top: 1px solid var(--border); }
  .card li::before {
    content: "";
    position: absolute;
    left: 2px;
    top: 17px;
    width: 12px;
    height: 7px;
    border-left: 2.5px solid var(--accent);
    border-bottom: 2.5px solid var(--accent);
    transform: rotate(-45deg);
  }

  /* ---------- faq ---------- */
  .faq-item {
    border-bottom: 1px solid var(--border);
  }
  .faq-item summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding: 20px 0;
    font-size: 17px;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
  }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary::after {
    content: "+";
    flex: none;
    font-size: 24px;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
    transition: transform 0.2s ease;
  }
  .faq-item[open] summary::after { transform: rotate(45deg); }
  .faq-item .answer {
    padding: 0 0 22px;
    font-size: 16px;
    color: var(--text-muted);
    max-width: 56ch;
  }

  /* ---------- footer ---------- */
  footer {
    border-top: 1px solid var(--border);
    padding: 44px 0 56px;
    font-size: 14px;
    color: var(--text-muted);
  }
  footer .name {
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  footer .note { margin-top: 10px; }

  @media (min-width: 720px) {
    .container { max-width: 760px; }
    section { padding: 100px 0; }
    #hero { padding: 120px 0 130px; }
    h1 { font-size: 46px; }
    h2 { font-size: 32px; }
    #hero .subhead { font-size: 19px; max-width: 58ch; }
    .cards { grid-template-columns: 1fr 1fr; align-items: start; }
    #demo .btn { width: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="container"><div class="logo" id="logo"></div></div>
</header>

<section id="hero">
  <div class="container">
    <h1 id="heroHeadline"></h1>
    <p class="subhead" id="heroSubhead"></p>
    <a class="btn" id="heroBtn"></a>
  </div>
</section>

<section id="demo">
  <div class="container">
    <span class="kicker" id="demoKicker"></span>
    <h2 id="demoTitle"></h2>
    <p id="demoBody"></p>
    <a class="btn" id="demoBtn" target="_blank" rel="noopener"></a>
  </div>
</section>

<section id="why">
  <div class="container">
    <span class="kicker" id="whyKicker"></span>
    <div id="whyParagraphs"></div>
  </div>
</section>

<section id="how">
  <div class="container">
    <span class="kicker" id="howKicker"></span>
    <div id="howSteps"></div>
  </div>
</section>

<section id="pricing">
  <div class="container">
    <span class="kicker" id="pricingKicker"></span>
    <div class="cards" id="pricingCards"></div>
  </div>
</section>

<section id="faq">
  <div class="container">
    <span class="kicker" id="faqKicker"></span>
    <div id="faqItems"></div>
  </div>
</section>

<footer>
  <div class="container">
    <p class="name" id="footerName"></p>
    <p id="footerEmail"></p>
    <p class="note" id="footerNote"></p>
  </div>
</footer>

<script>
(function () {
  const $ = id => document.getElementById(id);
  const C = CONTENT;

  /* ----- apply brand colors from config ----- */
  const cs = C.brand.colors;
  const rs = document.documentElement.style;
  rs.setProperty("--accent", cs.accent);
  rs.setProperty("--accent-dark", cs.accentDark);
  rs.setProperty("--accent-soft", cs.accentSoft);
  rs.setProperty("--bg", cs.bg);
  rs.setProperty("--surface", cs.surface);
  rs.setProperty("--dark", cs.dark);
  rs.setProperty("--dark-text", cs.darkText);
  rs.setProperty("--text", cs.text);
  rs.setProperty("--text-muted", cs.textMuted);
  rs.setProperty("--border", cs.border);

  /* ----- header ----- */
  $("logo").innerHTML = C.brand.logoText + " <span>" + C.brand.logoAccent + "</span>";

  /* ----- hero ----- */
  $("heroHeadline").textContent = C.hero.headline;
  $("heroSubhead").textContent = C.hero.subhead;
  $("heroBtn").textContent = C.hero.buttonLabel;
  $("heroBtn").href = C.hero.buttonHref;

  /* ----- demo ----- */
  $("demoKicker").textContent = C.demo.kicker;
  $("demoTitle").textContent = C.demo.title;
  $("demoBody").textContent = C.demo.body;
  $("demoBtn").textContent = C.demo.buttonLabel;
  $("demoBtn").href = C.demo.url;

  /* ----- why ----- */
  $("whyKicker").textContent = C.why.kicker;
  C.why.paragraphs.forEach(text => {
    const p = document.createElement("p");
    p.textContent = text;
    $("whyParagraphs").appendChild(p);
  });

  /* ----- how ----- */
  $("howKicker").textContent = C.how.kicker;
  C.how.steps.forEach((s, i) => {
    const step = document.createElement("div");
    step.className = "step";
    const num = document.createElement("div");
    num.className = "step-num";
    num.textContent = i + 1;
    const body = document.createElement("div");
    const h = document.createElement("h3");
    h.textContent = s.title;
    const p = document.createElement("p");
    p.textContent = s.body;
    body.appendChild(h);
    body.appendChild(p);
    step.appendChild(num);
    step.appendChild(body);
    $("howSteps").appendChild(step);
  });

  /* ----- pricing ----- */
  $("pricingKicker").textContent = C.pricing.kicker;
  C.pricing.cards.forEach(card => {
    const el = document.createElement("div");
    el.className = "card" + (card.featured ? " featured" : "");
    const h = document.createElement("h3");
    h.textContent = card.name;
    const price = document.createElement("div");
    price.className = "price";
    price.textContent = card.price;
    const note = document.createElement("p");
    note.className = "price-note";
    note.textContent = card.priceNote;
    const ul = document.createElement("ul");
    card.features.forEach(f => {
      const li = document.createElement("li");
      li.textContent = f;
      ul.appendChild(li);
    });
    el.appendChild(h);
    el.appendChild(price);
    el.appendChild(note);
    el.appendChild(ul);
    $("pricingCards").appendChild(el);
  });

  /* ----- faq ----- */
  $("faqKicker").textContent = C.faq.kicker;
  C.faq.items.forEach(item => {
    const d = document.createElement("details");
    d.className = "faq-item";
    const s = document.createElement("summary");
    s.textContent = item.q;
    const a = document.createElement("div");
    a.className = "answer";
    a.textContent = item.a;
    d.appendChild(s);
    d.appendChild(a);
    $("faqItems").appendChild(d);
  });

  /* ----- footer ----- */
  $("footerName").textContent = C.footer.name;
  $("footerEmail").innerHTML = C.footer.emailLabel + ' <a href="mailto:' + C.footer.email + '">' + C.footer.email + "</a>";
  $("footerNote").textContent = C.footer.note;
})();
</script>
</body>
</html>
